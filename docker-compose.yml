services:
  joytag-api:
    build: .
    container_name: joytag_api_server
    ports:
      - "8000:8000"
    environment:
      TAGGER_BACKEND: pixai
      PIXAI_MODEL_NAME: v0.9
      PIXAI_GENERAL_THRESHOLD: "0.30"
      PIXAI_CHARACTER_THRESHOLD: "0.75"
      QWEN_VL_MODEL_NAME: Qwen/Qwen2.5-VL-3B-Instruct
      QWEN_VL_LOAD_IN_4BIT: "1"
      QWEN_VL_MAX_NEW_TOKENS: "384"
      QWEN_VL_MAX_PIXELS: "602112"
      QWEN_VL_MIN_PIXELS: "100352"
      QWEN_VL_MAX_IMAGE_SIDE: "1024"
      HF_HOME: /cache/huggingface
      HUGGINGFACE_HUB_CACHE: /cache/huggingface/hub
      TRANSFORMERS_CACHE: /cache/huggingface/transformers
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    volumes:
      - hf-cache:/cache/huggingface
    
    # ★★★ ここがガチの魔改造ポイント！ ★★★
    
    # --workers 1 を追加して、プロセスが1個で動くように指定！
    # これでログの重複問題が解決するはずだよ✨
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    
    # コンテナがちゃんと生きてるかチェックする機能を追加
    healthcheck:
      # 30秒ごとに「curl http://localhost:8000」を試して！
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000', timeout=5).read()"]
      interval: 30s    # チェックの間隔
      timeout: 10s     # タイムアウトまでの時間
      retries: 3       # 失敗した場合に3回までリトライ
      start_period: 60s # コンテナ起動後、チェック開始まで60秒待つ（モデルロード用）

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  hf-cache:
